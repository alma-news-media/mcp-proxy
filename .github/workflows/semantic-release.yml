name: Semantic Release

# Creates a semver tag and GitHub Release from conventional commits (go-semantic-release).
# Tagged releases let clients install with: go install github.com/alma-news-media/mcp-proxy@latest

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

concurrency:
  group: semantic-release
  cancel-in-progress: false

env:
  # Pin release; bump when upgrading go-semantic-release.
  SEMREL_VERSION: "2.31.0"

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install go-semantic-release
        run: |
          set -euo pipefail
          v="${SEMREL_VERSION}"
          asset="semantic-release_v${v}_linux_amd64"
          base="https://github.com/go-semantic-release/semantic-release/releases/download/v${v}"
          curl -fsSL "${base}/${asset}" -o "${asset}"
          curl -fsSL "${base}/semantic-release_v${v}_checksums.txt" -o checksums.txt
          grep "${asset}" checksums.txt | sha256sum -c -
          mv "${asset}" semantic-release
          chmod +x semantic-release

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./semantic-release \
            --download-plugins \
            --show-progress \
            --allow-no-changes
